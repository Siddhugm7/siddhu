
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- Primary Meta Tags -->
  <title>FlyBird | Mobile Bird Game</title>
  <meta name="title" content="FlyBird | Mobile Bird Game">
  <meta name="description" content="Fly through pipes in FlyBird. Optimized for mobile and web.">
  <meta name="theme-color" content="#0f172a">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://flybird.example.com/">
  <meta property="og:title" content="FlyBird | Mobile Bird Game">
  <meta property="og:description" content="Fly through pipes in FlyBird. Optimized for mobile and web.">
  <meta property="og:image" content="https://raw.githubusercontent.com/samuelcust/flappy-bird-assets/master/sprites/message.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="FlyBird | Mobile Bird Game">
  <meta property="twitter:description" content="Play FlyBird now on your mobile!">
  
  <!-- Mobile Web App Settings -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0f172a;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      position: fixed;
    }

    #root {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      image-rendering: pixelated;
      display: block;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background-color: #4ec0ca;
    }

    /* Remove tap highlight on mobile */
    * {
      -webkit-tap-highlight-color: transparent;
    }

    .cloud {
        position: absolute;
        background: white;
        border-radius: 50px;
        opacity: 0.8;
        animation: moveClouds linear infinite;
    }

    .cloud::before, .cloud::after {
        content: '';
        position: absolute;
        background: white;
        border-radius: 50%;
    }

    .cloud-1 { width: 100px; height: 40px; top: 15%; left: -150px; animation-duration: 25s; }
    .cloud-1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
    .cloud-1::after { width: 40px; height: 40px; top: -15px; left: 45px; }

    .cloud-2 { width: 150px; height: 60px; top: 40%; left: -200px; animation-duration: 35s; animation-delay: 5s; }
    .cloud-2::before { width: 80px; height: 80px; top: -40px; left: 20px; }
    .cloud-2::after { width: 60px; height: 60px; top: -30px; left: 70px; }

    .cloud-3 { width: 120px; height: 45px; top: 70%; left: -180px; animation-duration: 30s; animation-delay: 12s; }
    .cloud-3::before { width: 60px; height: 60px; top: -30px; left: 20px; }
    .cloud-3::after { width: 50px; height: 50px; top: -20px; left: 55px; }

    /* Flying Birds in Background */
    .bg-bird {
        position: absolute;
        width: 20px;
        height: 10px;
        border-top: 2px solid rgba(255,255,255,0.5);
        border-radius: 50% 50% 0 0;
        animation: moveClouds linear infinite;
    }

    .bg-bird::after {
        content: '';
        position: absolute;
        right: -18px;
        width: 20px;
        height: 10px;
        border-top: 2px solid rgba(255,255,255,0.5);
        border-radius: 50% 50% 0 0;
    }

    .bg-bird-1 { top: 20%; animation-duration: 15s; animation-delay: 2s; }
    .bg-bird-2 { top: 50%; animation-duration: 18s; animation-delay: 8s; }
    .bg-bird-3 { top: 80%; animation-duration: 20s; animation-delay: 4s; }

    @keyframes moveClouds {
        from { transform: translateX(-200px); }
        to { transform: translateX(calc(100vw + 400px)); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    @keyframes shadow {
      0%, 100% { transform: scale(1); opacity: 0.2; }
      50% { transform: scale(0.7); opacity: 0.1; }
    }

    @keyframes bgScroll {
      from { background-position: 0 0; }
      to { background-position: -1000px 0; }
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }

    .animate-shadow {
      animation: shadow 3s ease-in-out infinite;
    }

    .home-bg-scroll {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 200%;
      height: 100%;
      background-image: url('https://raw.githubusercontent.com/samuelcust/flappy-bird-assets/master/sprites/background-day.png');
      background-repeat: repeat-x;
      background-position: bottom;
      background-size: contain;
      animation: bgScroll 30s linear infinite;
      opacity: 0.9;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai",
    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="index.tsx"></script>
</body>
</html>
